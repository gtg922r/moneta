name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: uv run pytest --cov=moneta --cov-report=term-missing --cov-fail-under=85

      - name: Validate example models
        run: |
          for f in examples/*.moneta.yaml; do
            echo "Validating $f..."
            uv run moneta validate "$f"
          done

      - name: Run example models
        run: |
          uv run moneta run examples/retirement_basic.moneta.yaml --seed 42 --no-report
          uv run moneta run examples/retirement_with_equity.moneta.yaml --seed 42 --no-report
          uv run moneta run examples/scenario_comparison.moneta.yaml --seed 42 --no-report
